<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan Siswa 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div id="main-container" class="w-full max-w-md animate__animated animate__fadeIn">
        
        <!-- Header / Logo -->
        <div class="text-center mb-10">
            <div class="bg-white w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-xl rotate-3 hover:rotate-0 transition-transform duration-300 border border-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Portal Kelulusan</h1>
            <p class="text-slate-500 mt-2 font-medium">Tahun Pelajaran 2024/2025</p>
        </div>

        <!-- Form Input -->
        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl shadow-blue-200/50">
            <div class="mb-8">
                <label for="nisn-input" class="block text-sm font-bold text-slate-600 mb-3 text-center uppercase tracking-widest">Nomor Induk Siswa Nasional</label>
                <input type="number" id="nisn-input" pattern="\d*" inputmode="numeric" placeholder="Masukkan 10 Digit NISN" 
                    class="w-full px-6 py-4 bg-white/50 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-center text-xl font-bold tracking-[0.2em] placeholder:tracking-normal placeholder:font-normal placeholder:text-slate-300">
            </div>
            <button onclick="cekKelulusan()" 
                class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/30 transition-all duration-200 text-lg">
                Lihat Hasil Kelulusan
            </button>
        </div>

        <p class="text-center text-xs text-slate-400 mt-10 font-medium px-4">
            Gunakan koneksi internet yang stabil untuk mengakses data hasil ujian.
        </p>
    </div>

    <!-- Modal Hasil (Pop-up) -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl animate__animated animate__zoomIn">
            
            <!-- Bagian Atas / Status -->
            <div id="status-banner" class="p-10 text-center text-white transition-colors duration-500">
                <div id="status-icon" class="mb-5 bg-white/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto backdrop-blur-sm"></div>
                <h2 id="status-title" class="text-3xl font-black mb-2 tracking-tight"></h2>
                <p id="status-subtitle" class="text-sm font-medium opacity-90"></p>
            </div>

            <!-- Bagian Detail -->
            <div class="bg-white p-8">
                <div class="space-y-5">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 uppercase font-black tracking-[0.15em] mb-1">Nama Lengkap</span>
                        <span id="res-nama" class="text-slate-800 font-bold text-lg leading-tight"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 uppercase font-black tracking-[0.15em] mb-1">Tempat Lahir</span>
                            <span id="res-tempat" class="text-slate-800 font-bold"></span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 uppercase font-black tracking-[0.15em] mb-1">Tanggal Lahir</span>
                            <span id="res-tanggal" class="text-slate-800 font-bold"></span>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 uppercase font-black tracking-[0.15em] mb-1">Program Keahlian</span>
                        <span id="res-prodi" class="text-slate-800 font-bold"></span>
                    </div>
                    <div class="pt-4 border-t border-slate-50 flex items-center justify-between">
                        <span class="text-[10px] text-slate-400 uppercase font-black tracking-[0.15em]">Keterangan Akhir</span>
                        <span id="res-status" class="font-black px-4 py-1 rounded-full text-xs tracking-wider"></span>
                    </div>
                </div>

                <button onclick="closeModal()" 
                    class="mt-10 w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-colors shadow-xl">
                    Tutup Pengumuman
                </button>
            </div>
        </div>
    </div>

    <!-- Alert Box -->
    <div id="alert-box" class="fixed top-8 left-1/2 -translate-x-1/2 bg-rose-600 text-white px-8 py-4 rounded-2xl shadow-2xl hidden animate__animated animate__fadeInDown z-[60] font-bold">
        NISN tidak ditemukan dalam database!
    </div>

    <script>
        /**
         * DATA SISWA (Sampel dari Spreadsheet Anda)
         * Anda bisa menambahkan ribuan data di sini.
         */
        const siswaData = [
            {
                nisn: "0071234567",
                nama: "ADITYA PRATAMA",
                tempatLahir: "JAKARTA",
                tanggalLahir: "10 MEI 2007",
                programKeahlian: "TEKNIK KOMPUTER DAN JARINGAN",
                lulus: true
            },
            {
                nisn: "0077654321",
                nama: "SITI NUR HALIZA",
                tempatLahir: "SURABAYA",
                tanggalLahir: "22 JUNI 2007",
                programKeahlian: "OTOMATISASI TATA KELOLA PERKANTORAN",
                lulus: true
            },
            {
                nisn: "0061112223",
                nama: "REHAN SAPUTRA",
                tempatLahir: "MEDAN",
                tanggalLahir: "15 AGUSTUS 2006",
                programKeahlian: "TEKNIK INSTALASI TENAGA LISTRIK",
                lulus: false
            }
        ];

        function cekKelulusan() {
            const inputVal = document.getElementById('nisn-input').value;
            const alertBox = document.getElementById('alert-box');
            
            if (!inputVal) return;

            const siswa = siswaData.find(s => s.nisn === inputVal);

            if (siswa) {
                showModal(siswa);
            } else {
                alertBox.classList.remove('hidden');
                setTimeout(() => {
                    alertBox.classList.add('hidden');
                }, 3000);
            }
        }

        function showModal(data) {
            const modal = document.getElementById('result-modal');
            const banner = document.getElementById('status-banner');
            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const subtitle = document.getElementById('status-subtitle');
            const statusLabel = document.getElementById('res-status');
            
            // Fill Content
            document.getElementById('res-nama').innerText = data.nama;
            document.getElementById('res-tempat').innerText = data.tempatLahir;
            document.getElementById('res-tanggal').innerText = data.tanggalLahir;
            document.getElementById('res-prodi').innerText = data.programKeahlian;
            
            if (data.lulus) {
                banner.classList.add('bg-emerald-600');
                banner.classList.remove('bg-rose-600');
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>`;
                title.innerText = "LULUS";
                subtitle.innerText = "Selamat! Anda Dinyatakan Telah Lulus";
                statusLabel.innerText = "LULUS";
                statusLabel.className = "font-black px-4 py-1 rounded-full text-[10px] tracking-wider bg-emerald-100 text-emerald-700";
            } else {
                banner.classList.add('bg-rose-600');
                banner.classList.remove('bg-emerald-600');
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
                title.innerText = "TIDAK LULUS";
                subtitle.innerText = "Tetap Semangat, Anda Belum Lulus Tahun Ini";
                statusLabel.innerText = "TIDAK LULUS";
                statusLabel.className = "font-black px-4 py-1 rounded-full text-[10px] tracking-wider bg-rose-100 text-rose-700";
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('nisn-input').value = "";
        }
    </script>
</body>
</html>
