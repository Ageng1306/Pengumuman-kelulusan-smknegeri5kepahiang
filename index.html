<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan 2026</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md text-center">

    <!-- HEADER -->
    <div class="mb-8">
        <img src="lambang sekolah.png" class="w-24 mx-auto mb-3">
        <h1 class="text-2xl font-bold">SMK Negeri 5 Kepahiang</h1>
        <p class="text-gray-500">Pengumuman Kelulusan 2026</p>
    </div>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow-xl">
        <input id="nisn-input" type="text" placeholder="Masukkan NISN"
            class="w-full border p-3 rounded-lg mb-4 text-center">

        <button onclick="cekKelulusan()" 
            class="bg-blue-600 text-white px-4 py-3 rounded-lg w-full">
            Lihat Hasil Kelulusan
        </button>

        <p id="debug" class="text-xs text-red-500 mt-3"></p>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl text-center w-80">
        <h2 id="judul" class="text-xl font-bold mb-2"></h2>
        <p id="nama"></p>
        <p id="ttl"></p>
        <p id="prodi"></p>
        <p id="status" class="font-bold mt-2"></p>
        <button onclick="tutup()" class="mt-4 bg-black text-white px-4 py-2 rounded">
            Tutup
        </button>
    </div>
</div>

<script>
async function cekKelulusan() {
    const nisn = document.getElementById('nisn-input').value.trim();
    const debug = document.getElementById('debug');

    if (!nisn) {
        alert("Masukkan NISN!");
        return;
    }

    debug.innerText = "Loading...";

    try {
        const url = "https://script.google.com/macros/s/AKfycbzDFTXL1SXA0nGsKGuPlnlc1N8jFi7NZJvvpgBpaRrI04nxJbnwZ_qQ7L58Fp-73NCJ/exec?nisn=" 
                    + encodeURIComponent(nisn);

        console.log("REQUEST:", url);

        const res = await fetch(url);
        const data = await res.json();

        console.log("RESPONSE:", data);

        if (data.error) {
            debug.innerText = data.error;
            return;
        }

        if (data.status === "Data tidak ditemukan") {
            debug.innerText = "NISN tidak ditemukan";
            return;
        }

        // tampilkan ke modal
        document.getElementById('judul').innerText = data.status.toUpperCase();
        document.getElementById('nama').innerText = data.nama;
        document.getElementById('ttl').innerText = data.tempatlahir + ", " + data.tanggallahir;
        document.getElementById('prodi').innerText = data.programkeahlian;
        document.getElementById('status').innerText = data.status;

        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');

        debug.innerText = "";

    } catch (err) {
        console.error(err);
        debug.innerText = "Gagal koneksi ke server!";
    }
}

function tutup() {
    document.getElementById('modal').classList.add('hidden');
}
</script>

</body>
</html>
