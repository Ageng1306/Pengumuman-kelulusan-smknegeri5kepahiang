<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md text-center">
    <h1 class="text-xl font-bold mb-4">Cek Kelulusan</h1>

    <input id="nisn-input" placeholder="Masukkan NISN"
        class="w-full border p-3 rounded mb-3 text-center">

    <button onclick="cekKelulusan()" 
        class="bg-blue-600 text-white px-4 py-2 rounded w-full">
        Cek
    </button>

    <div id="debug" class="text-xs text-red-500 mt-3"></div>
</div>

<script>
async function cekKelulusan() {
    const nisn = document.getElementById('nisn-input').value.trim();
    const debug = document.getElementById('debug');

    debug.innerText = "Loading...";

    try {
        const url = "https://script.google.com/macros/s/AKfycbyvYe3O5p5LRLJD5K8d0v7OxnFkQymPi9GoHXyx_lyVNCg3lz7WLvehXzjoRTLN7WRU/exec?nisn=" + nisn;
        
        const res = await fetch(url);
        const text = await res.text(); // ambil sebagai TEXT dulu

        console.log("RAW RESPONSE:", text);
        debug.innerText = text; // tampilkan di layar

        let data;
        try {
            data = JSON.parse(text); // baru parse
        } catch (e) {
            throw "Response bukan JSON!";
        }

        if (data.status === "Data tidak ditemukan") {
            debug.innerText = "NISN tidak ditemukan";
            return;
        }

        alert("Nama: " + data.nama + " | Status: " + data.status);

    } catch (err) {
        console.error(err);
        debug.innerText = "ERROR: " + err;
    }
}
</script>

</body>
</html>
