<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan 2026</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md text-center">

    <!-- HEADER -->
    <div class="mb-8">
        <img src="lambang sekolah.png" class="w-24 mx-auto mb-3">
        <h1 class="text-2xl font-bold">SMK Negeri 5 Kepahiang</h1>
        <p class="text-gray-500">Pengumuman Kelulusan 2026</p>
    </div>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow-xl">
        <input id="nisn-input" type="text" placeholder="Masukkan NISN"
            class="w-full border p-3 rounded-lg mb-4 text-center">

        <button onclick="cekKelulusan()" 
            class="bg-blue-600 text-white px-4 py-3 rounded-lg w-full">
            Lihat Hasil Kelulusan
        </button>

        <p id="debug" class="text-xs text-red-500 mt-3"></p>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl text-center w-80">
        <h2 id="judul" class="text-xl font-bold mb-2"></h2>
        <p id="nama"></p>
        <p id="ttl"></p>
        <p id="prodi"></p>
        <p id="status" class="font-bold mt-2"></p>
        <button onclick="tutup()" class="mt-4 bg-black text-white px-4 py-2 rounded">
            Tutup
        </button>
    </div>
</div>

<script>
async function cekKelulusan() {
    const nisn = document.getElementById('nisn-input').value.trim();
    const alertBox = document.getElementById('alert-box');

    if (!nisn) {
        alert("Masukkan NISN!");
        return;
    }

    try {
        const url = "https://script.google.com/macros/s/AKfycbzDFTXL1SXA0nGsKGuPlnlc1N8jFi7NZJvvpgBpaRrI04nxJbnwZ_qQ7L58Fp-73NCJ/exec?nisn=" 
                    + encodeURIComponent(nisn);

        const res = await fetch(url);
        const data = await res.json();

        if (!data || data.status === "Data tidak ditemukan") {
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 3000);
            return;
        }

        showModal({
            nama: data.nama,
            tempat: data.tempatlahir,
            tanggal: data.tanggallahir,
            prodi: data.programkeahlian,
            status: data.status
        });

    } catch (err) {
        console.error(err);
        alert("Gagal koneksi ke server!");
    }
}

function showModal(d) {
    document.getElementById('res-nama').innerText = d.nama;
    document.getElementById('res-tempat').innerText = d.tempat;
    document.getElementById('res-tanggal').innerText = d.tanggal;
    document.getElementById('res-prodi').innerText = d.prodi;
    document.getElementById('res-status').innerText = d.status;

    const title = document.getElementById('status-title');

    if (d.status.toLowerCase() === "lulus") {
        title.innerText = "LULUS 🎉";
        title.className = "text-2xl font-bold mb-4 text-green-600";
    } else {
        title.innerText = "TIDAK LULUS";
        title.className = "text-2xl font-bold mb-4 text-red-600";
    }

    document.getElementById('result-modal').classList.remove('hidden');
    document.getElementById('result-modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('result-modal').classList.add('hidden');
    document.getElementById('result-modal').classList.remove('flex');
}
</script>
