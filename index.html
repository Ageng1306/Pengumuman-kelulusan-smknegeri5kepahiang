<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan Siswa 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div id="main-container" class="w-full max-w-md animate__animated animate__fadeIn">
        
    <div class="text-center mb-10">
        <div class="bg-white w-28 h-28 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-xl border border-blue-100 p-2">
            <img src="lambang sekolah.png" class="w-full h-full object-contain">
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 uppercase">SMK Negeri 5 Kepahiang</h1>
        <p class="text-slate-500 mt-2 font-medium">Pengumuman Kelulusan TP 2024/2025</p>
    </div>

    <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl shadow-blue-200/50">
        <div class="mb-8">
            <input type="number" id="nisn-input" placeholder="Masukkan NISN"
                class="w-full px-6 py-4 border-2 rounded-2xl text-center text-xl font-bold">
        </div>
        <button onclick="cekKelulusan()" 
            class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">
            Lihat Hasil Kelulusan
        </button>
    </div>
</div>

<!-- MODAL -->
<div id="result-modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center">
    <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full">
        <h2 id="status-title" class="text-2xl font-bold mb-4"></h2>
        <p id="res-nama"></p>
        <p id="res-tempat"></p>
        <p id="res-tanggal"></p>
        <p id="res-prodi"></p>
        <p id="res-status" class="font-bold mt-3"></p>
        <button onclick="closeModal()" class="mt-5 bg-black text-white px-5 py-2 rounded-xl">Tutup</button>
    </div>
</div>

<div id="alert-box" class="fixed top-5 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-xl hidden">
    NISN tidak ditemukan!
</div>

<script>
<script>
<script>
async function cekKelulusan() {
    const nisn = document.getElementById('nisn-input').value.trim();
    const alertBox = document.getElementById('alert-box');

    if (!nisn) {
        alert("Masukkan NISN!");
        return;
    }

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbyvYe3O5p5LRLJD5K8d0v7OxnFkQymPi9GoHXyx_lyVNCg3lz7WLvehXzjoRTLN7WRU/exec?nisn=" + nisn);
        const data = await res.json();

        if (!data || data.status === "Data tidak ditemukan") {
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 3000);
            return;
        }

        const siswa = {
            nama: data.nama,
            tempat: data.tempatlahir,
            tanggal: data.tanggallahir,
            prodi: data.programkeahlian,
            lulus: data.status.toLowerCase() === "lulus"
        };

        showModal(siswa);

    } catch (e) {
        console.error(e);
        alert("Gagal koneksi ke server!");
    }
}

function showModal(d) {
    document.getElementById('res-nama').innerText = d.nama;
    document.getElementById('res-tempat').innerText = d.tempat;
    document.getElementById('res-tanggal').innerText = d.tanggal;
    document.getElementById('res-prodi').innerText = d.prodi;

    if (d.lulus) {
        document.getElementById('status-title').innerText = "LULUS 🎉";
        document.getElementById('res-status').innerText = "Selamat, Anda Lulus!";
    } else {
        document.getElementById('status-title').innerText = "TIDAK LULUS";
        document.getElementById('res-status').innerText = "Tetap semangat!";
    }

    document.getElementById('result-modal').classList.remove('hidden');
    document.getElementById('result-modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('result-modal').classList.add('hidden');
    document.getElementById('result-modal').classList.remove('flex');
}
</script>
